extends: default

ignore: |
  frontend/node_modules/
  test_linters/
  .venv/

rules:
  line-length:
    max: 120
    level: error
  document-start:
    present: false
  truthy:
    allowed-values: ['true', 'false', 'yes', 'no', 'on', 'off']
  indentation:
    spaces: 4
    indent-sequences: consistent
