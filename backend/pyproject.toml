[tool.pytest.ini_options]
asyncio_mode = "auto"
testpaths = ["tests"]
pythonpath = [".", "src"]
addopts = "-v --tb=short"
filterwarnings = [
    "ignore::DeprecationWarning:httpx._client:",
    "ignore::DeprecationWarning:passlib.utils:",
    "ignore::PendingDeprecationWarning:starlette.formparsers:",
]
markers = [
    "integration: tests that require a live PostgreSQL database",
]

[tool.coverage.run]
source = ["src"]
omit = ["*/tests/*"]

[tool.coverage.report]
fail_under = 80
skip_covered = false
show_missing = true
