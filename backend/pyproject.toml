[tool.pytest.ini_options]
asyncio_mode = "auto"
testpaths = ["tests"]
pythonpath = [".", "src"]
addopts = "-v --tb=short"
markers = [
    "integration: tests that require a live PostgreSQL database",
]

[tool.coverage.run]
source = ["src"]
omit = ["*/tests/*"]

[tool.coverage.report]
fail_under = 80
skip_covered = false
show_missing = true
