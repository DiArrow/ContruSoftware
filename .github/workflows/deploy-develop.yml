name: Deploy Develop

on:
  push:
    branches: [ "deployment" ]

jobs:
  deploy:
    runs-on: self-hosted
    steps:
      - name: Obtener últimos cambios
        uses: actions/checkout@v4

      - name: Crear archivo .env
      - run: |
          echo "POSTGRES_HOST=${{ secrets.POSTGRES_HOST }}" > .env
          echo "POSTGRES_PORT=${{ secrets.POSTGRES_PORT }}" >> .env
          echo "POSTGRES_DB=${{ secrets.POSTGRES_DB }}" >> .env
          echo "POSTGRES_USER=${{ secrets.POSTGRES_USER }}" >> .env
          echo "POSTGRES_APP_USER=${{ secrets.POSTGRES_APP_USER }}" >> .env
          echo "POSTGRES_PASSWORD=${{ secrets.POSTGRES_PASSWORD }}" >> .env
          echo "POSTGRES_APP_PASSWORD=${{ secrets.POSTGRES_APP_PASSWORD }}" >> .env
          echo "SECRET_KEY=${{ secrets.SECRET_KEY }}" >> .env
          echo "ALGORITHM=${{ secrets.ALGORITHM }}" >> .env
          echo "ACCESS_TOKEN_EXPIRE_MINUTES=${{ secrets.ACCESS_TOKEN_EXPIRE_MINUTES }}" >> .env
          echo "POSTGRES_USER_SOL=${{ secrets.POSTGRES_USER_SOL }}" >> .env
          echo "POSTGRES_PASSWORD_SOL=${{ secrets.POSTGRES_PASSWORD_SOL }}" >> .env
          echo "POSTGRES_USER_EST=${{ secrets.POSTGRES_USER_EST }}" >> .env
          echo "POSTGRES_PASSWORD_EST=${{ secrets.POSTGRES_PASSWORD_EST }}" >> .env
          echo "POSTGRES_USER_AYU=${{ secrets.POSTGRES_USER_AYU }}" >> .env
          echo "POSTGRES_PASSWORD_AYU=${{ secrets.POSTGRES_PASSWORD_AYU }}" >> .env
          echo "POSTGRES_USER_PRO=${{ secrets.POSTGRES_USER_PRO }}" >> .env
          echo "POSTGRES_PASSWORD_PRO=${{ secrets.POSTGRES_PASSWORD_PRO }}" >> .env
          echo "POSTGRES_USER_ADM=${{ secrets.POSTGRES_USER_ADM }}" >> .env
          echo "POSTGRES_PASSWORD_ADM=${{ secrets.POSTGRES_PASSWORD_ADM }}" >> .env

      - name: Levantar servicios
        run: |
          docker compose -f docker-compose.yml down
          docker volume rm $(docker volume ls -q)  # <-- Esto en un futuro debe ser una migración de la base de datos
          docker compose -f docker-compose.yml up -d --build
