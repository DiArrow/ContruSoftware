name: Lint Database (SQL)

on:
  push:
    paths:
      - 'db/**'
      - '**/*.sql'

permissions:
  contents: write

jobs:
  lint-and-fix:
    runs-on: ubuntu-latest
    steps:
      - name: Checkout code
        uses: actions/checkout@v4

      - name: Setup Python
        uses: actions/setup-python@v5
        with:
          python-version: '3.10'

      - name: Install SQLFluff
        run: pip install sqlfluff

      - name: Run SQLFluff (Auto-fix)
        working-directory: ./db
        continue-on-error: true # Solo advierte
        run: sqlfluff fix . --dialect postgres --force

      - name: Commit Auto-fix changes
        uses: stefanzweifel/git-auto-commit-action@v5
        with:
          commit_message: "style(db): auto-fix sqlfluff format"
