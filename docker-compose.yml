services:
  frontend:
    build:
      context: ./frontend/
    ports:
      - 80:80
    depends_on:
      - backend

  backend:
    build:
      context: ./backend/
    ports:
      - 8000:8000
    depends_on:
      - db
  db:
    build:
      context: ./db/
    environment:
      POSTGRES_DB: ${POSTGRES_DB}
      POSTGRES_USER: ${POSTGRES_USER}
      POSTGRES_APP_USER: ${POSTGRES_APP_USER}
      POSTGRES_PASSWORD: ${POSTGRES_PASSWORD}
      POSTGRES_APP_PASSWORD: ${POSTGRES_APP_PASSWORD}
    ports:
      - 5432:5432
    volumes:
      - db_data:/var/lib/postgresql/data

volumes:
  db_data:
