services:
  frontend:
    build:
      context: ./frontend/
    ports:
      - 80:80
    depends_on:
      - backend

  backend:
    build:
      context: ./backend/
    ports:
      - 8000:8000
    environment:
      POSTGRES_HOST: db
      POSTGRES_PORT: "5432"
      POSTGRES_DB: ${POSTGRES_DB}
      POSTGRES_USER: ${POSTGRES_USER}
      POSTGRES_PASSWORD: ${POSTGRES_PASSWORD}
      POSTGRES_APP_USER: ${POSTGRES_APP_USER}
      POSTGRES_APP_PASSWORD: ${POSTGRES_APP_PASSWORD}
      SECRET_KEY: ${SECRET_KEY}
      ALGORITHM: ${ALGORITHM:-HS256}
      ACCESS_TOKEN_EXPIRE_MINUTES: ${ACCESS_TOKEN_EXPIRE_MINUTES:-30}
      POSTGRES_USER_SOL: ${POSTGRES_USER_SOL}
      POSTGRES_PASSWORD_SOL: ${POSTGRES_PASSWORD_SOL}
      POSTGRES_USER_EST: ${POSTGRES_USER_EST}
      POSTGRES_PASSWORD_EST: ${POSTGRES_PASSWORD_EST}
      POSTGRES_USER_AYU: ${POSTGRES_USER_AYU}
      POSTGRES_PASSWORD_AYU: ${POSTGRES_PASSWORD_AYU}
      POSTGRES_USER_PRO: ${POSTGRES_USER_PRO}
      POSTGRES_PASSWORD_PRO: ${POSTGRES_PASSWORD_PRO}
      POSTGRES_USER_ADM: ${POSTGRES_USER_ADM}
      POSTGRES_PASSWORD_ADM: ${POSTGRES_PASSWORD_ADM}
    depends_on:
      - db
  db:
    build:
      context: ./db/
    environment:
      POSTGRES_DB: ${POSTGRES_DB}
      POSTGRES_USER: ${POSTGRES_USER}
      POSTGRES_APP_USER: ${POSTGRES_APP_USER}
      POSTGRES_PASSWORD: ${POSTGRES_PASSWORD}
      POSTGRES_APP_PASSWORD: ${POSTGRES_APP_PASSWORD}
      POSTGRES_USER_SOL: ${POSTGRES_USER_SOL}
      POSTGRES_PASSWORD_SOL: ${POSTGRES_PASSWORD_SOL}
      POSTGRES_USER_EST: ${POSTGRES_USER_EST}
      POSTGRES_PASSWORD_EST: ${POSTGRES_PASSWORD_EST}
      POSTGRES_USER_AYU: ${POSTGRES_USER_AYU}
      POSTGRES_PASSWORD_AYU: ${POSTGRES_PASSWORD_AYU}
      POSTGRES_USER_PRO: ${POSTGRES_USER_PRO}
      POSTGRES_PASSWORD_PRO: ${POSTGRES_PASSWORD_PRO}
      POSTGRES_USER_ADM: ${POSTGRES_USER_ADM}
      POSTGRES_PASSWORD_ADM: ${POSTGRES_PASSWORD_ADM}
    ports:
      - 5433:5432
    volumes:
      - db_data:/var/lib/postgresql/data

volumes:
  db_data:
